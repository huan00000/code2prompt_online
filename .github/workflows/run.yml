name: Code2Prompt Action
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install code2prompt via cargo (标准方式)
        run: |
          # ubuntu-latest 已预装 Rust/cargo，直接安装即可
          cargo install code2prompt
          # 验证安装
          code2prompt --version

      - name: Run Python script
        run: |
          python generate.py
